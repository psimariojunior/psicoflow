<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0D9488">
  <title>PsiHumanis - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #134E4A 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 420px; width: 100%; }
    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 32px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .icon-ring {
      width: 88px; height: 88px;
      background: rgba(13,148,136,0.15);
      border: 2px solid rgba(13,148,136,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      animation: pulse-ring 2s ease-in-out infinite;
    }
    .icon-ring svg { width: 40px; height: 40px; color: #5EEAD4; }
    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(13,148,136,0.3); }
      50% { box-shadow: 0 0 0 12px rgba(13,148,136,0); }
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #94a3b8; margin-bottom: 28px; line-height: 1.5; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #0D9488, #0F766E);
      color: white;
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      width: 100%;
      justify-content: center;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(13,148,136,0.4); }
    .btn:active { transform: translateY(0); }
    .btn svg { width: 18px; height: 18px; }
    .features { margin-top: 28px; text-align: left; display: grid; gap: 10px; }
    .feature {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .feature-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .feature-icon.green { background: rgba(34,197,94,0.15); }
    .feature-icon.teal { background: rgba(13,148,136,0.15); }
    .feature-icon.amber { background: rgba(245,158,11,0.15); }
    .feature-icon svg { width: 16px; height: 16px; }
    .feature-icon.green svg { color: #4ade80; }
    .feature-icon.teal svg { color: #5EEAD4; }
    .feature-icon.amber svg { color: #fbbf24; }
    .feature-text { font-size: 13px; color: #cbd5e1; }
    .last-sync { margin-top: 20px; font-size: 11px; color: #475569; }
    .connection-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 6px;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="icon-ring">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
        </svg>
      </div>
      <h1>Sem conexão</h1>
      <p class="subtitle">Verifique sua internet e tente novamente.</p>
      <button class="btn" onclick="window.location.reload()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182" />
        </svg>
        Tentar Novamente
      </button>
      <div class="features">
        <div class="feature">
          <div class="feature-icon green">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
            </svg>
          </div>
          <span class="feature-text">Dados salvos em cache funcionam offline</span>
        </div>
        <div class="feature">
          <div class="feature-icon teal">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
          </div>
          <span class="feature-text">Suas consultas e dados estão preservados</span>
        </div>
        <div class="feature">
          <div class="feature-icon amber">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75Z" />
            </svg>
          </div>
          <span class="feature-text">Sync automático ao reconectar</span>
        </div>
      </div>
      <p class="last-sync"><span class="connection-dot"></span>Offline agora</p>
    </div>
  </div>
</body>
</html>
