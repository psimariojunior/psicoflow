services:
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "3478:3478/udp"
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit/livekit.yaml
    command: --config /etc/livekit/livekit.yaml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7880"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: psicoflow
      POSTGRES_USER: psicoflow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-psicoflow123}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psicoflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://psicoflow:${DB_PASSWORD:-psicoflow123}@postgres:5432/psicoflow
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      LOG_LEVEL: info
      SMTP_HOST: ${SMTP_HOST:-smtp-mail.outlook.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-psi_mariojunior@hotmail.com}
      SMTP_PASS: ${SMTP_PASS:-Marinhoo1993..}
      SMTP_FROM: ${SMTP_FROM:-psi_mariojunior@hotmail.com}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-API7dde4347f0b9}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-a6e59152ca11c7b5eadbb40ed11d17dcf2f1d55b70369da2a2c5ea3a3183f036}
      LIVEKIT_URL: ws://livekit:7880

volumes:
  pgdata:
